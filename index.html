<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位腦錢包</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/elliptic@6.5.4/dist/elliptic.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .strength-bar { transition: width 0.5s ease-in-out, background-color 0.5s; }
        .tab-active { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .tab-inactive { background-color: #1f2937; color: #9ca3af; }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="fixed top-6 left-6 flex space-x-2 z-50">
        <button id="tabPass" onclick="switchMode('pass')" class="tab-active px-4 py-2 rounded-xl text-xs font-black uppercase transition-all">🔑 Passwords</button>
        <button id="tabBTC" onclick="switchMode('btc')" class="tab-inactive px-4 py-2 rounded-xl text-xs font-black uppercase transition-all">₿ Bitcoin</button>
    </div>

    <div class="bg-gray-900/80 p-6 rounded-3xl shadow-[0_0_50px_rgba(59,130,246,0.1)] w-full max-w-lg border border-blue-900/20 backdrop-blur-md">
        <h1 id="mainTitle" class="text-2xl font-black mb-6 text-center bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent italic tracking-tighter">BRAINWALLET</h1>
        
        <div class="space-y-4">
            <div class="space-y-4 bg-gray-800/40 p-4 rounded-2xl border border-gray-800">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest mb-1 text-blue-400">Target / 服務名稱</label>
                    <input type="text" id="service" placeholder="例如: Binance, Google" autocomplete="off"
                        class="w-full p-2.5 rounded-xl bg-gray-950 border border-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white text-sm">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest mb-1 text-blue-400">Master Key / 腦秘密 (支援注音)</label>
                    <div class="relative">
                        <input type="text" id="masterKey" name="my-brain-key" placeholder="點擊即可輸入明碼" 
                            autocomplete="off" spellcheck="false" onfocus="autoShow(this)" onblur="autoHide(this)"
                            style="-webkit-text-security: disc;"
                            class="w-full p-2.5 pr-10 rounded-xl bg-gray-950 border border-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white text-sm transition-all">
                        <button onclick="toggleView('masterKey')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-blue-400 p-1 transition-colors">👁️</button>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest mb-1 text-yellow-500">Salt / 自定義鹽值</label>
                    <div class="relative">
                        <input type="text" id="userSalt" name="my-salt-val" placeholder="加點料..." 
                            autocomplete="off" spellcheck="false" onfocus="autoShow(this)" onblur="autoHide(this)"
                            style="-webkit-text-security: disc;"
                            class="w-full p-2.5 pr-10 rounded-xl bg-gray-950 border border-yellow-900/20 focus:outline-none focus:ring-2 focus:ring-yellow-600 text-white text-sm transition-all">
                        <button onclick="toggleView('userSalt')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-yellow-500 p-1 transition-colors">👁️</button>
                    </div>
                </div>
            </div>

            <button onclick="executeAction()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition duration-300 shadow-xl active:scale-95 text-lg uppercase tracking-wider">
                Generate Secure Data 🚀
            </button>

            <div id="modePass" class="space-y-3">
                <div id="strengthContainer" class="hidden space-y-1.5 px-1 pb-1">
                    <div class="flex justify-between items-end">
                        <span class="text-[9px] font-bold text-gray-500 uppercase">Security Strength</span>
                        <span id="strengthText" class="text-[10px] font-black text-blue-400 italic">--</span>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-1 overflow-hidden">
                        <div id="strengthBar" class="strength-bar h-full w-0 bg-blue-500"></div>
                    </div>
                </div>

                <div class="space-y-2.5">
                    <div>
                        <label class="text-[9px] font-bold text-gray-500 uppercase px-1">8-Char Alpha (一般英數)</label>
                        <div class="flex space-x-1.5">
                            <input type="text" id="res8Alpha" readonly class="w-full p-2.5 text-xs rounded-xl bg-gray-950 border border-gray-800 text-blue-300 font-mono">
                            <button id="btn8" onclick="toggleResultView('res8Alpha', 'btn8')" class="px-3 rounded-xl bg-gray-800 hover:bg-gray-700">👁️</button>
                            <button onclick="copy('res8Alpha')" class="px-3 rounded-xl bg-gray-800 hover:bg-blue-600">📋</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-blue-400 uppercase px-1">12-Char Alpha (英數混合)</label>
                        <div class="flex space-x-1.5">
                            <input type="text" id="res12Alpha" readonly class="w-full p-2.5 text-xs rounded-xl bg-gray-950 border border-gray-800 text-blue-400 font-mono">
                            <button id="btn12A" onclick="toggleResultView('res12Alpha', 'btn12A')" class="px-3 rounded-xl bg-gray-800 hover:bg-gray-700">👁️</button>
                            <button onclick="copy('res12Alpha')" class="px-3 rounded-xl bg-gray-800 hover:bg-blue-600">📋</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-emerald-500 uppercase px-1">24-Char Full (含符號/最強)</label>
                        <div class="flex space-x-1.5">
                            <input type="text" id="res24Full" readonly class="w-full p-2.5 text-xs rounded-xl bg-gray-950 border border-gray-800 text-emerald-400 font-mono">
                            <button id="btn24F" onclick="toggleResultView('res24Full', 'btn24F')" class="px-3 rounded-xl bg-gray-800 hover:bg-gray-700">👁️</button>
                            <button onclick="copy('res24Full')" class="px-3 rounded-xl bg-gray-800 hover:bg-blue-600">📋</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-yellow-600 uppercase px-1">12-Digit PIN (純數字)</label>
                        <div class="flex space-x-1.5">
                            <input type="text" id="resNum" readonly class="w-full p-2.5 text-xs rounded-xl bg-gray-950 border border-gray-800 text-yellow-400 font-mono">
                            <button id="btnNum" onclick="toggleResultView('resNum', 'btnNum')" class="px-3 rounded-xl bg-gray-800 hover:bg-gray-700">👁️</button>
                            <button onclick="copy('resNum')" class="px-3 rounded-xl bg-gray-800 hover:bg-blue-600">📋</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="modeBTC" class="hidden space-y-2.5">
                <div>
                    <label class="text-[9px] font-bold text-red-500 uppercase px-1">Private Key (WIF)</label>
                    <div class="flex space-x-1.5">
                        <input type="text" id="btcPriv" readonly class="w-full p-2.5 text-xs rounded-xl bg-gray-950 border border-gray-800 text-red-400 font-mono">
                        <button id="btnBP" onclick="toggleResultView('btcPriv', 'btnBP')" class="px-3 rounded-xl bg-gray-800 hover:bg-gray-700">👁️</button>
                        <button onclick="copy('btcPriv')" class="px-3 rounded-xl bg-gray-800 hover:bg-red-900">📋</button>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-gray-400 uppercase px-1">Public Key (Hex)</label>
                    <div class="flex space-x-1.5">
                        <input type="text" id="btcPub" readonly class="w-full p-2.5 text-xs rounded-xl bg-gray-950 border border-gray-800 text-gray-400 font-mono text-[9px]">
                        <button id="btnBPub" onclick="toggleResultView('btcPub', 'btnBPub')" class="px-3 rounded-xl bg-gray-800 hover:bg-gray-700">👁️</button>
                        <button onclick="copy('btcPub')" class="px-3 rounded-xl bg-gray-800 hover:bg-blue-600">📋</button>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-orange-400 uppercase px-1">BTC Address (Legacy)</label>
                    <div class="flex space-x-1.5">
                        <input type="text" id="btcAddr" readonly class="w-full p-2.5 text-xs rounded-xl bg-gray-950 border border-gray-800 text-orange-400 font-mono">
                        <button id="btnBA" onclick="toggleResultView('btcAddr', 'btnBA')" class="px-3 rounded-xl bg-gray-800 hover:bg-gray-700">👁️</button>
                        <button onclick="copy('btcAddr')" class="px-3 rounded-xl bg-gray-800 hover:bg-orange-600">📋</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'pass';
        let realPasswords = {};
        const charsets = {
            alpha: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789",
            full: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?",
            num: "0123456789"
        };

        // --- 模式切換 ---
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tabPass').className = (mode === 'pass' ? 'tab-active' : 'tab-inactive') + ' px-4 py-2 rounded-xl text-xs font-black uppercase transition-all';
            document.getElementById('tabBTC').className = (mode === 'btc' ? 'tab-active' : 'tab-inactive') + ' px-4 py-2 rounded-xl text-xs font-black uppercase transition-all';
            document.getElementById('modePass').classList.toggle('hidden', mode !== 'pass');
            document.getElementById('modeBTC').classList.toggle('hidden', mode !== 'btc');
            document.getElementById('mainTitle').innerText = mode === 'pass' ? 'BRAINWALLET' : 'BITCOIN WALLET';
        }

        // --- 完美復活的智慧切換邏輯 ---
        function autoShow(el) {
            el.style.webkitTextSecurity = 'none'; // 解除黑點
            const btn = el.nextElementSibling;
            if(btn) {
                btn.innerHTML = '🙈';
                btn.classList.add('text-blue-400');
            }
        }

        function autoHide(el) {
            setTimeout(() => {
                el.style.webkitTextSecurity = 'disc'; // 恢復黑點
                const btn = el.nextElementSibling;
                if(btn) {
                    btn.innerHTML = '👁️';
                    btn.classList.remove('text-blue-400');
                }
            }, 200); // 給按鈕點擊留一點緩衝時間
        }

        function toggleView(id) {
            const el = document.getElementById(id);
            const btn = el.nextElementSibling;
            if (el.style.webkitTextSecurity === 'none') {
                el.style.webkitTextSecurity = 'disc';
                btn.innerHTML = '👁️';
                btn.classList.remove('text-blue-400');
            } else {
                el.style.webkitTextSecurity = 'none';
                btn.innerHTML = '🙈';
                btn.classList.add('text-blue-400');
            }
        }

        // --- BTC 核心算法 ---
        function base58Check(payload) {
            const wa = CryptoJS.lib.WordArray.create(payload);
            const hash1 = CryptoJS.SHA256(wa);
            const hash2 = CryptoJS.SHA256(hash1);
            const checksum = hash2.toString(CryptoJS.enc.Hex).substring(0, 8);
            const totalHex = Array.from(payload).map(b => b.toString(16).padStart(2, '0')).join('') + checksum;
            const finalBuffer = new Uint8Array(totalHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            const ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
            let digits = [0];
            for (let i = 0; i < finalBuffer.length; i++) {
                for (let j = 0; j < digits.length; j++) digits[j] <<= 8;
                digits[0] += finalBuffer[i];
                let carry = 0;
                for (let j = 0; j < digits.length; j++) {
                    digits[j] += carry;
                    carry = (digits[j] / 58) | 0;
                    digits[j] %= 58;
                }
                while (carry) { digits.push(carry % 58); carry = (carry / 58) | 0; }
            }
            let res = '';
            for (let i = 0; finalBuffer[i] === 0 && i < finalBuffer.length - 1; i++) res += ALPHABET[0];
            for (let i = digits.length - 1; i >= 0; i--) res += ALPHABET[digits[i]];
            return res;
        }

        // --- 執行生成 ---
        async function executeAction() {
            try {
                const svc = document.getElementById('service').value.toLowerCase().trim();
                const key = document.getElementById('masterKey').value;
                const salt = document.getElementById('userSalt').value;
                if (!svc || !key) return alert("請填寫欄位！");
                const base = svc + key + salt;
                const encoder = new TextEncoder();

                if (currentMode === 'pass') {
                    const getPwd = async (s, c, l) => {
                        const h = await crypto.subtle.digest('SHA-256', encoder.encode(base + s));
                        const arr = new Uint8Array(h);
                        let r = ""; for(let i=0; i<l; i++) r += c.charAt(arr[i % 32] % c.length);
                        return r;
                    };
                    realPasswords.res8Alpha = await getPwd("@a8", charsets.alpha, 8);
                    realPasswords.res12Alpha = await getPwd("@a12", charsets.alpha, 12);
                    realPasswords.res24Full = await getPwd("@f24", charsets.full, 24);
                    const nH = await crypto.subtle.digest('SHA-256', encoder.encode(base + "@n12"));
                    realPasswords.resNum = BigInt('0x' + Array.from(new Uint8Array(nH)).map(b => b.toString(16).padStart(2, '0')).join('').substring(0,16)).toString().substring(0,12);

                    ['res8Alpha', 'res12Alpha', 'res24Full', 'resNum'].forEach(id => {
                        const mask = id.includes('24') ? [4,4] : [3,3];
                        document.getElementById(id).value = realPasswords[id].substring(0,mask[0]) + "****" + realPasswords[id].slice(-mask[1]);
                    });
                    document.getElementById('strengthContainer').classList.remove('hidden');
                    document.getElementById('strengthBar').style.width = '100%';
                    document.getElementById('strengthText').innerText = 'GODLIKE 🛡️';
                } else {
                    const seed = await crypto.subtle.digest('SHA-256', encoder.encode(base + "@btc-wallet"));
                    const privBytes = new Uint8Array(seed);
                    const privHex = Array.from(privBytes).map(b => b.toString(16).padStart(2, '0')).join('');
                    const wifData = new Uint8Array([0x80, ...privBytes, 0x01]);
                    realPasswords.btcPriv = base58Check(wifData);
                    const ec = new elliptic.ec('secp256k1');
                    const keyPair = ec.keyFromPrivate(privHex);
                    const pubHex = keyPair.getPublic(true, 'hex');
                    realPasswords.btcPub = pubHex;
                    const sha256Pub = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(pubHex));
                    const ripemd160 = CryptoJS.RIPEMD160(sha256Pub);
                    const addrData = new Uint8Array([0x00, ...new Uint8Array(ripemd160.toString().match(/.{1,2}/g).map(b => parseInt(b, 16)))]);
                    realPasswords.btcAddr = base58Check(addrData);

                    ['btcPriv', 'btcPub', 'btcAddr'].forEach(id => {
                        const mask = id === 'btcPub' ? [6,6] : [4,4];
                        document.getElementById(id).value = realPasswords[id].substring(0,mask[0]) + "****" + realPasswords[id].slice(-mask[1]);
                    });
                }
            } catch (e) { alert("運算失敗，請確認網路環境以載入加密組件。"); }
        }

        // --- 結果遮蔽切換 ---
        function toggleResultView(id, btnId) {
            const el = document.getElementById(id);
            if (el.value.includes('****')) {
                el.value = realPasswords[id];
                document.getElementById(btnId).innerText = "🙈";
            } else {
                const mask = id.includes('24') || id === 'btcPub' ? [4,4] : [3,3];
                el.value = realPasswords[id].substring(0, mask[0]) + "****" + realPasswords[id].slice(-mask[1]);
                document.getElementById(btnId).innerText = "👁️";
            }
        }

        // --- 複製功能 ---
        function copy(id) {
            navigator.clipboard.writeText(realPasswords[id]);
            const btn = event.currentTarget;
            btn.innerText = "✅"; setTimeout(() => btn.innerText = "📋", 1000);
        }
    </script>
</body>
</html>
