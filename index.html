<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極致安全腦錢包 (中文支援版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
    </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-gray-800 p-6 rounded-2xl shadow-2xl w-full max-w-lg border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">🛡️ 中文強化 腦錢包保險箱</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">服務名稱 (如: google, 銀行)</label>
                <input type="text" id="service" placeholder="例如: gmail" autocomplete="off"
                    class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500">
            </div>

            <div class="relative">
                <label class="block text-sm font-medium mb-1 text-gray-300">腦錢包秘密 (支援中文 🧠)</label>
                <input type="password" id="masterKey" placeholder="輸入你的中文或英文密語" autocomplete="new-password"
                    class="w-full p-2.5 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500">
                <button onclick="toggleView('masterKey')" class="absolute right-3 top-9 text-gray-400 hover:text-white p-1">👁️</button>
            </div>

            <div class="relative">
                <label class="block text-sm font-medium mb-1 text-yellow-500 font-bold">自定義鹽值 (支援中文，可空白)</label>
                <input type="password" id="userSalt" placeholder="例如: 2026年我的生日" autocomplete="new-password"
                    class="w-full p-2.5 rounded-lg bg-gray-700 border border-yellow-900/50 focus:outline-none focus:ring-2 focus:ring-yellow-600 text-white placeholder-gray-500">
                <button onclick="toggleView('userSalt')" class="absolute right-3 top-9 text-gray-400 hover:text-white p-1">👁️</button>
            </div>

            <button onclick="generateAll()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-lg mt-3 text-lg">
                🚀 生成安全密碼
            </button>

            <hr class="border-gray-700 my-2">

            <div class="space-y-3.5">
                <div class="result-item">
                    <label class="text-xs text-blue-300 font-bold">12 碼 (僅限英數混合)</label>
                    <div class="flex space-x-1.5 items-center">
                        <input type="text" id="resAlpha" readonly class="w-full p-2 text-sm rounded-lg bg-gray-900 border border-gray-700 text-blue-400 font-mono tracking-wider">
                        <button id="btnToggleResAlpha" onclick="toggleResultView('resAlpha', 'btnToggleResAlpha')" class="p-2 rounded-lg bg-gray-700/50 hover:bg-gray-600 text-gray-300">👁️</button>
                        <button onclick="copy('resAlpha')" class="p-2 rounded-lg bg-gray-700/50 hover:bg-gray-600 text-gray-300">📋</button>
                    </div>
                </div>

                <div class="result-item">
                    <label class="text-xs text-gray-400">12 碼 (大小寫+數字+符號)</label>
                    <div class="flex space-x-1.5 items-center">
                        <input type="text" id="resFull12" readonly class="w-full p-2 text-sm rounded-lg bg-gray-900 border border-gray-700 text-green-400 font-mono tracking-wider">
                        <button id="btnToggleResFull12" onclick="toggleResultView('resFull12', 'btnToggleResFull12')" class="p-2 rounded-lg bg-gray-700/50 hover:bg-gray-600 text-gray-300">👁️</button>
                        <button onclick="copy('resFull12')" class="p-2 rounded-lg bg-gray-700/50 hover:bg-gray-600 text-gray-300">📋</button>
                    </div>
                </div>

                <div class="result-item">
                    <label class="text-xs text-gray-400">24 碼 (極致強度 / 全字元)</label>
                    <div class="flex space-x-1.5 items-center">
                        <input type="text" id="resFull24" readonly class="w-full p-2 text-sm rounded-lg bg-gray-900 border border-gray-700 text-green-400 font-mono tracking-wider">
                        <button id="btnToggleResFull24" onclick="toggleResultView('resFull24', 'btnToggleResFull24')" class="p-2 rounded-lg bg-gray-700/50 hover:bg-gray-600 text-gray-300">👁️</button>
                        <button onclick="copy('resFull24')" class="p-2 rounded-lg bg-gray-700/50 hover:bg-gray-600 text-gray-300">📋</button>
                    </div>
                </div>

                <div class="result-item">
                    <label class="text-xs text-yellow-500 font-semibold">12 碼純數字 (提款 PIN)</label>
                    <div class="flex space-x-1.5 items-center">
                        <input type="text" id="resNum" readonly class="w-full p-2 text-sm rounded-lg bg-gray-900 border border-gray-700 text-yellow-400 font-mono tracking-wider">
                        <button id="btnToggleResNum" onclick="toggleResultView('resNum', 'btnToggleResNum')" class="p-2 rounded-lg bg-gray-700/50 hover:bg-gray-600 text-gray-300">👁️</button>
                        <button onclick="copy('resNum')" class="p-2 rounded-lg bg-gray-700/50 hover:bg-gray-600 text-gray-300">📋</button>
                    </div>
                </div>
            </div>
        </div>
        
        <p class="mt-6 text-[10px] text-gray-600 text-center uppercase tracking-widest font-mono">
            UTF-8 Chinese Supported • Local Encryption • 2026 Security
        </p>
    </div>

    <script>
        let realPasswords = { resAlpha: '', resFull12: '', resFull24: '', resNum: '' };
        const maskConfig = { resAlpha: [3, 3], resFull12: [3, 3], resFull24: [4, 4], resNum: [3, 3] };

        const charsets = {
            alpha: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789",
            full: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?",
            num: "0123456789"
        };

        function toggleView(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        // 核心加密映射邏輯
        async function getComplexPassword(base, salt, charset, length) {
            const encoder = new TextEncoder();
            // 這裡會將中文轉化為 UTF-8 的 byte 陣列
            const data = encoder.encode(base + salt);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = new Uint8Array(hashBuffer);
            
            let result = "";
            for (let i = 0; i < length; i++) {
                // 每個字元由 hash 中的 byte 決定，確保確定性
                const charIndex = hashArray[i % 32] % charset.length;
                result += charset.charAt(charIndex);
            }
            return result;
        }

        function getMaskedString(str, visibleStart, visibleEnd) {
            if (!str) return '';
            return str.substring(0, visibleStart) + '****' + str.slice(-visibleEnd);
        }

        async function generateAll() {
            const service = document.getElementById('service').value.toLowerCase().trim();
            const masterKey = document.getElementById('masterKey').value;
            const salt = document.getElementById('userSalt').value;

            if (!service || !masterKey) {
                alert("請填寫服務名稱與主密碼！");
                return;
            }

            const base = service + masterKey + salt;

            // 生成各種格式
            realPasswords.resAlpha = await getComplexPassword(base, "@alpha12", charsets.alpha, 12);
            realPasswords.resFull12 = await getComplexPassword(base, "@full12", charsets.full, 12);
            realPasswords.resFull24 = await getComplexPassword(base, "@full24", charsets.full, 24);
            realPasswords.resNum = await getComplexPassword(base, "@num12", charsets.num, 12);

            // 顯示遮蔽版
            document.getElementById('resAlpha').value = getMaskedString(realPasswords.resAlpha, 3, 3);
            document.getElementById('resFull12').value = getMaskedString(realPasswords.resFull12, 3, 3);
            document.getElementById('resFull24').value = getMaskedString(realPasswords.resFull24, 4, 4);
            document.getElementById('resNum').value = getMaskedString(realPasswords.resNum, 3, 3);

            resetAllToggleButtons();
        }

        function toggleResultView(inputId, btnId) {
            const inputEl = document.getElementById(inputId);
            const btnEl = document.getElementById(btnId);
            if (!realPasswords[inputId]) return;

            const config = maskConfig[inputId];
            const masked = getMaskedString(realPasswords[inputId], config[0], config[1]);

            if (inputEl.value === masked) {
                inputEl.value = realPasswords[inputId];
                btnEl.innerText = "🙈";
                btnEl.classList.add('bg-blue-900', 'text-blue-200');
            } else {
                inputEl.value = masked;
                btnEl.innerText = "👁️";
                btnEl.classList.remove('bg-blue-900', 'text-blue-200');
            }
        }

        function resetAllToggleButtons() {
            const ids = [['resAlpha','btnToggleResAlpha'], ['resFull12','btnToggleResFull12'], ['resFull24','btnToggleResFull24'], ['resNum','btnToggleResNum']];
            ids.forEach(([inp, btn]) => {
                const b = document.getElementById(btn);
                b.innerText = "👁️";
                b.classList.remove('bg-blue-900', 'text-blue-200');
            });
        }

        function copy(id) {
            const text = realPasswords[id];
            if (!text) return;
            navigator.clipboard.writeText(text);
            const btn = event.currentTarget;
            btn.innerText = "✅";
            setTimeout(() => { btn.innerText = "📋"; }, 1000);
        }
    </script>
</body>
</html>
